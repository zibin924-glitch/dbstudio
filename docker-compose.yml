version: "3.8"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # 安全修复：不再硬编码加密密钥，通过 .env 文件提供
      # 生成方式: python -c "import secrets; print(secrets.token_hex(32))"
      - DBSTUDIO_ENCRYPTION_KEY=${DBSTUDIO_ENCRYPTION_KEY}
      - DBSTUDIO_DEBUG=${DBSTUDIO_DEBUG:-false}
      - DBSTUDIO_API_KEY=${DBSTUDIO_API_KEY:-}
    env_file:
      - .env
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
