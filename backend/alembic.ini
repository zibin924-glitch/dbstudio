# Alembic configuration for DBStudio.
#
# The sqlalchemy.url below is a default for local development.
# In production, override it via the DBSTUDIO_DATABASE_URL environment variable
# or pass --sqlalchemy-url on the command line.
#
# NOTE: Alembic uses synchronous drivers. For SQLite the default sqlite://
# driver is used (not sqlite+aiosqlite). For other databases, adjust the
# driver prefix accordingly (e.g. postgresql:// instead of postgresql+asyncpg://).

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./dbstudio.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
